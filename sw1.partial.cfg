aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 secret admin
username cisco privilege 15 secret cisco
!
vlan 10
 name 192.0.2.0/24_DATA_TESTNET1
!
vlan 20
 name 198.51.100.0/24_DATA_TESTNET2
!
vlan 30
 name 203.0.113.0/24_DATA_TESTNET3
!
ip access-list extended BASIC_DATA_SRVC_IN
 remark --- HTTP/HTTPS requests ---
 permit tcp any any eq 80
 permit tcp any any eq 443
 remark --- DNS queries ---
 permit udp any any eq 53
 permit tcp any any eq 53
 remark --- DHCP client to server ---
 permit udp any eq 68 any eq 67
 remark --- TCP return traffic ---
 permit tcp any any established
 deny ip any any log
!
ip access-list extended BASIC_DATA_SRVC_OUT
 remark --- HTTP/HTTPS responses ---
 permit tcp any eq 80 any
 permit tcp any eq 443 any
 remark --- DNS responses ---
 permit udp any eq 53 any
 permit tcp any eq 53 any
 remark --- DHCP server to client ---
 permit udp any eq 67 any eq 68
 remark --- TCP return traffic ---
 permit tcp any any established
 deny ip any any log
!
interface Ethernet0/1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface Ethernet0/2
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface Ethernet0/3
 switchport mode access
 switchport access vlan 30
 no shutdown
!
interface Vlan10
 description TEST-NET-1 (RFC5737)
 ip address 192.0.2.1 255.255.255.0
 ip access-group BASIC_DATA_SRVC_IN in
 ip access-group BASIC_DATA_SRVC_OUT out
 no shutdown
!
interface Vlan20
 description TEST-NET-2 (RFC5737)
 ip address 198.51.100.1 255.255.255.0
 ip access-group BASIC_DATA_SRVC_IN in
 ip access-group BASIC_DATA_SRVC_OUT out
 no shutdown
!
interface Vlan30
 description TEST-NET-3 (RFC5737)
 ip address 203.0.113.1 255.255.255.0
 ip access-group BASIC_DATA_SRVC_IN in
 ip access-group BASIC_DATA_SRVC_OUT out
 no shutdown

