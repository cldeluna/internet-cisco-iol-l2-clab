# Listen only on data interfaces
interface=eth1
bind-interfaces

# Ranges for relayed DHCP from each client VLAN
dhcp-range=set:vlan10,192.0.2.100,192.0.2.200,255.255.255.0,12h
dhcp-range=set:vlan20,198.51.100.100,198.51.100.200,255.255.255.0,12h
dhcp-range=set:vlan30,203.0.113.100,203.0.113.200,255.255.255.0,12h

# Per-VLAN gateway (the switch SVI)
dhcp-option=tag:vlan10,option:router,192.0.2.1
dhcp-option=tag:vlan20,option:router,198.51.100.1
dhcp-option=tag:vlan30,option:router,203.0.113.1

# DNS points to server
dhcp-option=tag:vlan10,option:dns-server,192.168.1.10
dhcp-option=tag:vlan20,option:dns-server,192.168.1.10
dhcp-option=tag:vlan30,option:dns-server,192.168.1.10