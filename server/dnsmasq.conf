# Listen only on data interfaces
interface=eth1
interface=eth2
interface=eth3
bind-interfaces

# DHCP pools — .100 to .200 per subnet
dhcp-range=eth1,192.0.2.100,192.0.2.200,255.255.255.0,12h
dhcp-range=eth2,198.51.100.100,198.51.100.200,255.255.255.0,12h
dhcp-range=eth3,203.0.113.100,203.0.113.200,255.255.255.0,12h

# Default gateway = switch SVI
dhcp-option=eth1,option:router,192.0.2.1
dhcp-option=eth2,option:router,198.51.100.1
dhcp-option=eth3,option:router,203.0.113.1

# DNS = this server
dhcp-option=eth1,option:dns-server,192.0.2.10
dhcp-option=eth2,option:dns-server,198.51.100.10
dhcp-option=eth3,option:dns-server,203.0.113.10
