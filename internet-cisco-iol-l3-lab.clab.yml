name: internet-cisco-iol-l2-lab

topology:
  nodes:
    core-sw1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.15.01
      type: L2
      startup-config: sw1.partial.cfg
      ports:
        - "20512:22"
        - "2223:23"

    server:
      kind: linux
      image: alpine:3.19
      binds:
        - server/dnsmasq.conf:/etc/dnsmasq.conf
        - server/nginx-default.conf:/etc/nginx/conf.d/default.conf
        - server/start.sh:/start.sh
      exec:
        - sh /start.sh

    client:
      kind: linux
      image: alpine:3.19
      binds:
        - client/start.sh:/start.sh
      ports:
        - "20513:22"
      exec:
        - sh /start.sh

  links:
    # Client — one port per VLAN
    - endpoints: ["client:eth1", "core-sw1:Ethernet0/1"]
    - endpoints: ["client:eth2", "core-sw1:Ethernet0/2"]
    - endpoints: ["client:eth3", "core-sw1:Ethernet0/3"]
    # Server — single link on VLAN 100
    - endpoints: ["server:eth1", "core-sw1:Ethernet1/0"]